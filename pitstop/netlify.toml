[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  directory = "netlify/functions"

[dev]
  command = "vite"
  targetPort = 5173
  port = 8888
  autoLaunch = false

[context.production.environment]
  NODE_VERSION = "20"

# SPA fallback — API routes are matched first by Netlify
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
